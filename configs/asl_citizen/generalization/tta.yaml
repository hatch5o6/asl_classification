# ASL Citizen — Test-Time Augmentation Only (test-only change, no retraining)
# Based on topk_48. Uses existing topk_48 checkpoint for testing with TTA.
save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/asl_citizen/informed_selection/topk_48
test_checkpoint: null
modalities: ["skeleton"]
joint_pruning: True

train_csv: data/asl_citizen/train.csv
val_csv: data/asl_citizen/val.csv
test_csv: data/asl_citizen/test.csv
class_id_csv: data/asl_citizen/class_ids.csv

seed: 4000
num_frames: video_mae
n_gpus: 8
device: cuda

# Learning rates
pretrained_learning_rate: 1e-04
new_learning_rate: 2e-04
skel_learning_rate: 2e-04
class_learning_rate: 2e-04
weight_decay: 0.01

# Training schedule
effective_batch_size: 64
early_stop: 30
save_top_k: 10
val_interval: 0.25
max_steps: 200000

# Architecture
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# BERT Skeleton Encoder
bert_hidden_layers: 2
bert_hidden_dim: 512
bert_att_heads: 8
bert_intermediate_size: 2048
bert_dropout: 0.0

# === L0 PRUNING SETTINGS ===
num_pose_points: 48
joint_indices_file: data/asl_citizen/informed_selection/topk/top_48_indices.json
init_keep_probability: 0.98
use_random_init: false

# L0 annealing schedule
l0_warmup_steps: 10000
l0_anneal_steps: 40000
l0_end_weight: 20.0

# Temperature annealing
temp_start: 10.0
temp_end: 0.01
temp_anneal_steps: 50000

classifier_dropout: 0.2
gradient_clip_val: 1.0

# === GENERALIZATION: Test-Time Augmentation ===
tta_augments: 5
tta_scale_range: [0.95, 1.05]
tta_rotation_deg: 10.0
tta_translate_range: 0.05
tta_speed_range: [0.9, 1.1]
tta_noise_std: 0.01