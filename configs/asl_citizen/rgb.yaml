# RGB baseline (ASL Citizen — 2,995 classes)
save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/asl_citizen/rgb
test_checkpoint: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/asl_citizen/rgb/checkpoints/epoch=20-step=13188-val_loss=2.028020-val_acc=0.591615.ckpt
modalities: ["rgb"]
joint_pruning: False

train_csv: data/asl_citizen/train.csv
val_csv: data/asl_citizen/val.csv
test_csv: data/asl_citizen/test.csv
class_id_csv: data/asl_citizen/class_ids.csv

seed: 4000
num_frames: video_mae
n_gpus: 8
device: cuda

# Learning rates
pretrained_learning_rate: 1e-04
new_learning_rate: 2e-04
skel_learning_rate: 2e-04
class_learning_rate: 2e-04
weight_decay: 0.01

# Training schedule
effective_batch_size: 64
early_stop: 30
save_top_k: 10
val_interval: 0.25
max_steps: 200000

# Architecture
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# BERT Skeleton Encoder (unused for RGB-only, kept for consistency)
bert_hidden_layers: 2
bert_hidden_dim: 512
bert_att_heads: 8
bert_intermediate_size: 2048
bert_dropout: 0.0

num_pose_points: 543
classifier_dropout: 0.2
gradient_clip_val: 1.0
