# Encoder comparison: SPOTER @ K=543 (AUTSL) — full skeleton
save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/encoder_comparison/autsl/spoter/k543
test_checkpoint: null
modalities: ["skeleton"]
joint_pruning: False
skeleton_encoder: spoter

train_csv: data/train.csv
val_csv: data/val.csv
test_csv: data/test.csv
class_id_csv: data/SignList_ClassId_TR_EN.csv

seed: 4000
num_frames: video_mae
n_gpus: 8
device: cuda

# Learning rates
pretrained_learning_rate: 1e-04
new_learning_rate: 2e-04
skel_learning_rate: 2.084e-04
class_learning_rate: 2e-04
weight_decay: 0.01

# Training schedule
effective_batch_size: 64
early_stop: 30
save_top_k: 3
val_interval: 1.0
max_steps: 200000

# Architecture
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# SPOTER Skeleton Encoder
spoter_hidden_dim: 256
spoter_spatial_layers: 1
spoter_temporal_layers: 4
spoter_att_heads: 8
spoter_dropout: 0.1

# Joint selection
num_pose_points: 543
joint_indices_file: null

classifier_dropout: 0.2
label_smoothing: 0.1
gradient_clip_val: 1.0
