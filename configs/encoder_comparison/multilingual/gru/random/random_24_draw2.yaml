# Random baseline: GRU @ K=24 draw 2 (MULTILINGUAL)
save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/encoder_comparison/multilingual/gru/random_24_draw2
test_checkpoint: null
modalities: ["skeleton"]
joint_pruning: true
skeleton_encoder: gru

train_csv: data/multilingual/train.csv
val_csv: data/multilingual/val.csv
test_csv: data/multilingual/test.csv
class_id_csv: data/multilingual/class_ids.csv

seed: 4000
num_frames: video_mae
n_gpus: 8
device: cuda

# Learning rates
pretrained_learning_rate: 1e-04
new_learning_rate: 2e-04
skel_learning_rate: 5.235e-05
class_learning_rate: 2e-04
weight_decay: 0.01

# Training schedule
effective_batch_size: 64
early_stop: 30
save_top_k: 3
val_interval: 1.0
max_steps: 500000

# Architecture
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# GRU Skeleton Encoder
gru_hidden_dim: 512
gru_num_layers: 3
gru_dropout: 0.2
gru_bidirectional: true

# Joint selection
num_pose_points: 24
joint_indices_file: data/random_selection/random_24_draw2_indices.json

# L0 pruning (disabled via l0_end_weight=0.0)
init_keep_probability: 0.98
use_random_init: false
l0_warmup_steps: 10000
l0_anneal_steps: 40000
l0_end_weight: 0.0
temp_start: 10.0
temp_end: 0.01
temp_anneal_steps: 50000

classifier_dropout: 0.3
label_smoothing: 0.1
gradient_clip_val: 1.0
