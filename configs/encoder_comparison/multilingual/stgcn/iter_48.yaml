# Iterative selection: STGCN @ K=48 (MULTILINGUAL)
save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/encoder_comparison/multilingual/stgcn/iter_48
test_checkpoint: null
modalities: ["skeleton"]
joint_pruning: False
skeleton_encoder: stgcn

train_csv: data/multilingual/train.csv
val_csv: data/multilingual/val.csv
test_csv: data/multilingual/test.csv
class_id_csv: data/multilingual/class_ids.csv

seed: 4000
num_frames: video_mae
n_gpus: 8
device: cuda

# Learning rates
pretrained_learning_rate: 1e-04
new_learning_rate: 2e-04
skel_learning_rate: 4.737e-04
class_learning_rate: 2e-04
weight_decay: 0.01

# Training schedule
effective_batch_size: 64
early_stop: 30
save_top_k: 3
val_interval: 1.0
max_steps: 500000

# Architecture
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# STGCN Skeleton Encoder
stgcn_channels: [64, 128, 256, 512]
stgcn_kernel_size: 13
stgcn_edges_file: data/mediapipe_edges.json

# Joint selection
num_pose_points: 48
joint_indices_file: data/multilingual/informed_selection/iterative/iter_48_indices.json

classifier_dropout: 0.1
label_smoothing: 0.1
gradient_clip_val: 1.0
