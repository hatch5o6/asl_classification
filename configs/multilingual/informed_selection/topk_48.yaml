# Top-K Independent Selection (48 points, Multilingual)
save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/multilingual/informed_selection/topk_48
test_checkpoint: null
modalities: ["skeleton"]
joint_pruning: True

train_csv: data/multilingual/train.csv
val_csv: data/multilingual/val.csv
test_csv: data/multilingual/test.csv
class_id_csv: data/multilingual/class_ids.csv

seed: 4000
num_frames: video_mae
n_gpus: 8
device: cuda

pretrained_learning_rate: 1e-04
new_learning_rate: 2e-04
skel_learning_rate: 2e-04
class_learning_rate: 2e-04
weight_decay: 0.01

effective_batch_size: 64
early_stop: 30
save_top_k: 10
val_interval: 0.25
max_steps: 200000

fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

bert_hidden_layers: 2
bert_hidden_dim: 512
bert_att_heads: 8
bert_intermediate_size: 2048
bert_dropout: 0.1

# === L0 PRUNING SETTINGS ===
num_pose_points: 48
joint_indices_file: data/multilingual/informed_selection/topk/top_48_indices.json
init_keep_probability: 0.98
use_random_init: false

l0_warmup_steps: 10000
l0_anneal_steps: 40000
l0_end_weight: 20.0

temp_start: 10.0
temp_end: 0.01
temp_anneal_steps: 50000

classifier_dropout: 0.2
label_smoothing: 0.1
gradient_clip_val: 1.0
