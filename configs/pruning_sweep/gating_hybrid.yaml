# GATING + L0 + RANDOM INIT (HYBRID - RECOMMENDED)
# Most robust approach with multiple safety mechanisms
#
# Key features:
# 1. Sample-specific gating network (~257 params)
# 2. L0 pruning with random initialization (breaks symmetry)
# 3. Combined gradient differentiation from both mechanisms
# 4. L0 weight = 20.0 (based on previous successful experiments)
#
# Expected behavior:
# - Faster bimodal separation than gating_l0 (by step 30k vs 50k)
# - More robust to different L0 weights
# - gate_std > 0.25 by step 50k (excellent differentiation)

save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/pruning_sweep_gating_hybrid
test_checkpoint: null
modalities: ["skeleton"]
joint_pruning: True

train_csv: data/train.csv
val_csv: data/val.csv
test_csv: data/test.csv
class_id_csv: data/SignList_ClassId_TR_EN.csv

seed: 4000
num_frames: video_mae
n_gpus: 4
device: cuda

# Learning rates
pretrained_learning_rate: 5e-05
new_learning_rate: 1e-04
skel_learning_rate: 1e-04
class_learning_rate: 1e-04
weight_decay: 0.01

# Training schedule
effective_batch_size: 32
early_stop: 30
save_top_k: 10
val_interval: 0.25
max_steps: 200000

# Architecture
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# BERT Skeleton Encoder
bert_hidden_layers: 2
bert_hidden_dim: 512
bert_att_heads: 8
bert_intermediate_size: 2048
bert_dropout: 0.0

# === L0 PRUNING SETTINGS ===
num_pose_points: 543
init_keep_probability: 0.98
use_random_init: true  # Break symmetry!
random_init_std: 0.1

# L0 annealing schedule
l0_warmup_steps: 10000
l0_anneal_steps: 40000
l0_end_weight: 20.0

# Temperature annealing
temp_start: 10.0
temp_end: 0.01
temp_anneal_steps: 50000

# === GATING SETTINGS ===
use_gating: true
gate_hidden_dim: 64
gate_learning_rate: 1e-04  # Same as skeleton LR

classifier_dropout: 0.2
gradient_clip_val: 1.0
