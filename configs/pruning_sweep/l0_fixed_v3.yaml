# FIXED L0 Pruning Implementation
# Based on research findings from ICLR 2018 paper and practical implementations
#
# Key fixes applied:
# 1. init_keep_probability: 0.98 (not 0.9) - start very high per research
# 2. Normalized L0 penalty - now comparable to classification loss magnitude
# 3. Aggressive temperature annealing (10.0 → 0.01 over 50k steps)
# 4. Higher L0 weight (20.0) - safe now that normalization is fixed
# 5. Disabled early stopping - sparsification causes temporary accuracy drops
#
# Expected behavior:
# - Warmup (0-10k): Model learns with all joints, no L0 pressure
# - Anneal (10k-50k): L0 ramps up, temperature drops, model starts pruning
# - Converge (50k-200k): Binary decisions locked in, fine-tune remaining joints
# - Result: Bimodal distribution with probs near 0.0 (pruned) and 1.0 (kept)

save: /home/ccoulson/groups/grp_asl_classification/nobackup/archive/SLR/models/pruning_sweep_l0_fixed_v3_optimized_v2
test_checkpoint: null
modalities: ["skeleton"]
joint_pruning: True

train_csv: data/train.csv
val_csv: data/val.csv
test_csv: data/test.csv
class_id_csv: data/SignList_ClassId_TR_EN.csv

seed: 4000
num_frames: video_mae
n_gpus: 8
device: cuda

# Learning rates
pretrained_learning_rate: 1e-04
new_learning_rate: 2e-04
skel_learning_rate: 3.55e-04
class_learning_rate: 2e-04
weight_decay: 0.01

# Training schedule
effective_batch_size: 64
early_stop: 30
save_top_k: 10
val_interval: 0.25
max_steps: 200000

# Architecture
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# BERT Skeleton Encoder
bert_hidden_layers: 4
bert_hidden_dim: 512
bert_att_heads: 8
bert_intermediate_size: 768
bert_dropout: 0.0

# Joint pruning - FIXED IMPLEMENTATION
num_pose_points: 543

# FIX 1: Initialize very high (0.98 not 0.9) per research
# "Start with gates initialised near 1, not 0 or 0.5" - Training Sparse NNs with L0
init_keep_probability: 0.98

# L0 annealing schedule - extended warmup, longer anneal
l0_warmup_steps: 10000      # Extended: let model learn joint importance first
l0_anneal_steps: 40000      # Slower ramp: 10k-50k steps
l0_end_weight: 50.0         # Optimized via Optuna (trial 17)

# FIX 3: Aggressive temperature annealing
# High start (10.0) → strong gradients for learning
# Fast anneal (50k) → forces binary decisions early
# Low end (0.01) → very sharp sigmoid, no middle ground
temp_start: 10.0
temp_end: 0.01
temp_anneal_steps: 50000

classifier_dropout: 0.1
gradient_clip_val: 1.0
