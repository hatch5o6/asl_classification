# TSLFormer Paper Exact Replica
# Paper: https://arxiv.org/abs/2505.07890
#
# Differences fixed vs previous exact configs:
#   bert_att_heads: 4       (paper says 4; previous configs wrongly used 8)
#   bert_dropout: 0.2       (paper says 0.2; previous configs used 0.0)
#   use_adam_optimizer: True          (paper uses Adam, not AdamW)
#   use_reduce_lr_on_plateau: True    (paper uses ReduceLROnPlateau, not warmup+linear)
#   use_class_weights: False          (paper does not mention class weights)
#   weight_decay: 0.0                 (paper does not mention weight decay)
#
# Already correct vs paper:
#   use_tslformer_joints: True  -> 50 joints (hands + upper-body pose, no face)
#   use_z_coord: True / num_coords: 3  -> 3D (x, y, z)
#   joint_pruning: False        -> manual selection, no learned pruning
#   bert_hidden_layers: 2
#   bert_hidden_dim: 512
#   classifier_dropout: 0.2

save: /home/hatch5o6/groups/grp_asl_classification/nobackup/archive/SLR/models/s_tslformer_paper_exact
test_checkpoint: null
modalities: ["skeleton"]

joint_pruning: False
use_tslformer_joints: True  # Selects 50 joints (hands + upper-body pose, drops 468 face pts)
use_z_coord: True
num_coords: 3               # x, y, z

# Optimizer / scheduler flags (handled in configure_optimizers)
use_adam_optimizer: True          # Use Adam (paper) instead of AdamW (our default)
use_reduce_lr_on_plateau: True    # Use ReduceLROnPlateau (paper) instead of warmup+linear
use_class_weights: False          # Paper does not mention class-weighted loss

train_csv: data/train.csv
val_csv: data/val.csv
test_csv: data/test.csv
class_id_csv: data/SignList_ClassId_TR_EN.csv

seed: 4000
num_frames: video_mae  # 16 frames (TSLFormer uses 15 fps; close enough for replication)

n_gpus: 8
device: cuda

# Learning rates — paper specifies 1e-4 with Adam
pretrained_learning_rate: 1e-04  # Unused for skeleton-only
new_learning_rate: 2e-04
skel_learning_rate: 2e-04
class_learning_rate: 2e-04
weight_decay: 0.0  # Paper does not mention weight decay; Adam default

# Training schedule
effective_batch_size: 64
early_stop: 10
save_top_k: 10
val_interval: 0.25  # Fraction of epoch
max_steps: 200000

# Depth/RGB encoder fields (unused for skeleton-only, required by config parser)
fusion_dim: 512
depth_image_size: 224
depth_hidden_dim: 384
depth_hidden_layers: 6
depth_att_heads: 6
depth_intermediate_size: 1536
depth_patch_size: 16

# BERT Skeleton Encoder — exact TSLFormer values
bert_hidden_layers: 2       # Paper: 2
bert_hidden_dim: 512        # Paper: 512
bert_att_heads: 4           # Paper: 4  (previous configs incorrectly used 8)
bert_intermediate_size: 2048
bert_dropout: 0.2           # Paper: 0.2  (previous configs incorrectly used 0.0)

# Joint config
num_pose_points: 50         # 8 upper-body pose + 42 hand landmarks
init_keep_probability: 0.9  # Unused (joint_pruning=False)
classifier_dropout: 0.2     # Paper: 0.2

gradient_clip_val: 1.0
